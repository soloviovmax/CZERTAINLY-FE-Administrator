name: Test Docker image

on:
  pull_request:
    branches: [ main*, feat/*, hotfix/* ]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}-docker-test
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  test:
    uses: OmniTrustILM/.github/.github/workflows/containers-test.yml@5537818b2955a0fee3d92975978a1cf4b116e46c # main
    with:
      image: ilm/frontend-administrator
      cache-scope: frontend-administrator
      build-args: |
        VERSION=${{ github.ref_name }}
