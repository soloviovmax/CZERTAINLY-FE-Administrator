name: Publish Docker image

on:
  push:
    branches: [ main ]
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}-harbor
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    uses: OmniTrustILM/.github/.github/workflows/containers-build-and-push.yml@76d3e30f897b6859824f1f0613150536ebc46d6c # main
    secrets:
      CONTAINER_REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
      CONTAINER_REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
      COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
    with:
      image: ilm/frontend-administrator
      cache-scope: frontend-administrator
      build-args: |
        VERSION=${{ github.ref_name }}
