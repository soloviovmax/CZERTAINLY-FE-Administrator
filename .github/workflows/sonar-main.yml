name: Sonar Main
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonar:
    name: Sonar • main
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install + lint + build + tests + coverage
        env:
          CI: true
        run: |
          npm ci --ignore-scripts
          npm run lint
          npm run build

          # Playwright deps (direct binary invocation, bypasses npm script hooks)
          ./node_modules/.bin/playwright install --with-deps

          npm run test:cov

          # Sanity check
          test -f coverage-playwright/lcov.info
          echo "Playwright LCOV generated: $(wc -l coverage-playwright/lcov.info | awk '{print $1}') lines"
          test -f coverage-vitest/lcov.info
          echo "Vitest LCOV generated: $(wc -l coverage-vitest/lcov.info | awk '{print $1}') lines"

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
