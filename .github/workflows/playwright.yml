name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      # Keep all browser jobs running on main even if one fails
      fail-fast: false
      matrix:
        # PRs: chromium only (fast feedback). Push to main / manual dispatch: full matrix.
        browser: ${{ github.event_name == 'pull_request' && fromJSON('["chromium"]') || fromJSON('["chromium", "firefox", "webkit"]') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Install Playwright Browsers
        # Only install the browser needed for this job (faster)
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run Playwright tests
        # Run only the project matching this browser
        run: npx playwright test -c playwright-ct.config.ts --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          # Unique artifact name per browser to avoid conflicts
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30
